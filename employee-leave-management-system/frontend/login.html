<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="ambient-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="glass-card page-fade-in">
    <div class="auth-title-box">
      <div class="auth-title-box-icon">
        <i class="fa-solid fa-lock"></i>
      </div>
      <h2>Login</h2>
    </div>

    <form id="login-form">
      <!-- Role Selection -->
      <div class="role-selector">
        <div class="role-tab">
          <input type="radio" id="role-emp" name="login-role" value="employee" checked>
          <label for="role-emp">Employee</label>
        </div>
        <div class="role-tab">
          <input type="radio" id="role-admin" name="login-role" value="admin">
          <label for="role-admin">Admin</label>
        </div>
      </div>

      <!-- Login Form Fields -->
      <div class="form-group">
        <label for="login-email">Email ID</label>
        <input type="email" id="login-email" placeholder="email@company.com" required>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">
        Login
      </button>
    </form>

    <div class="auth-bottom-text">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
</body>
</html>
