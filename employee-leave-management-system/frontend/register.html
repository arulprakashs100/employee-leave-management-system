<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Registration</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="ambient-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="glass-card page-fade-in">
    <div class="auth-title-box">
      <div class="auth-title-box-icon">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      <h2>Employee Registration</h2>
    </div>

    <form id="register-form">
      <div class="form-group">
        <label for="reg-name">Employee Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="reg-email">Email ID</label>
        <input type="email" id="reg-email" placeholder="john.doe@company.com" required>
      </div>

      <div class="form-group">
        <label for="reg-branch">Branch</label>
        <select id="reg-branch" required>
          <option value="" disabled selected>Select Branch...</option>
          <option value="Information Technology (IT)">Information Technology (IT)</option>
          <option value="Computer Science (CSE)">Computer Science (CSE)</option>
          <option value="Electronics and Communication (ECE)">Electronics and Communication (ECE)</option>
          <option value="Electrical and Electronics (EEE)">Electrical and Electronics (EEE)</option>
          <option value="Mechanical">Mechanical</option>
          <option value="Civil">Civil</option>
          <option value="Human Resources (HR)">Human Resources (HR)</option>
          <option value="Finance">Finance</option>
        </select>
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="reg-c-password">Confirm Password</label>
        <input type="password" id="reg-c-password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">
        Register
      </button>
    </form>

    <div class="auth-bottom-text">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
</body>
</html>
